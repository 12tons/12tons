<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Sorteador de Tonalidades</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin: 40px;
      background-color: #f9f9f9;
      color: #111;
    }

    h1 {
      margin-bottom: 20px;
    }

    .flags {
      margin-bottom: 20px;
    }

    .flag {
      font-size: 24px;
      cursor: pointer;
      margin: 0 5px;
      padding: 5px;
      border-radius: 5px;
    }

    .flag.ativo {
      background-color: #222;
    }

    .grupo {
      margin-bottom: 15px;
    }

    button {
      font-size: 18px;
      padding: 12px 18px;
      margin: 6px;
      border-radius: 6px;
      border: 2px solid #444;
      background-color: white;
      color: #111;
      cursor: pointer;
    }

    button:hover {
      background-color: #eaeaea;
    }

    .ativo {
      background-color: #222;
      color: white;
      border-color: #000;
    }

    #sortear {
      margin-top: 20px;
      font-size: 20px;
      padding: 12px 25px;
    }

    #resultado {
      font-size: 42px;
      margin-top: 30px;
      font-weight: bold;
    }

    #ciclo {
      margin-top: 20px;
      font-size: 20px;
      line-height: 1.6;
      max-width: 900px;
      margin-left: auto;
      margin-right: auto;
    }
  </style>
</head>

<body>

<div class="flags">
  <span class="flag ativo" onclick="setLang('pt')">🇧🇷</span>
  <span class="flag" onclick="setLang('en')">🇬🇧</span>
  <span class="flag" onclick="setLang('es')">🇪🇸</span>
  <span class="flag" onclick="setLang('fr')">🇫🇷</span>
</div>

<h1 id="titulo">Sorteador de Tonalidades</h1>

<div class="grupo">
  <button id="btn-maior" onclick="selecionar('maior')">Maiores</button>
  <button id="btn-menor" onclick="selecionar('menor')">Menores</button>
</div>

<div class="grupo">
  <button id="btn-quintas" onclick="setModo('quintas')">Quintas</button>
  <button id="btn-quartas" onclick="setModo('quartas')">Quartas</button>
</div>

<button id="sortear" onclick="sortear()">Sortear</button>

<div id="resultado">—</div>
<div id="ciclo"></div>

<script>

// =========================
// IDIOMAS
// =========================

let lang = "pt";

const textos = {
  pt: {
    titulo: "Sorteador de Tonalidades",
    maior: "Maiores",
    menor: "Menores",
    quintas: "Quintas",
    quartas: "Quartas",
    sortear: "Sortear",
    pronto: "Pronto!",
    fim: "Fim do ciclo!",
    instrucao: "Clique em Maiores ou Menores."
  },
  en: {
    titulo: "Key Randomizer",
    maior: "Major",
    menor: "Minor",
    quintas: "Fifths",
    quartas: "Fourths",
    sortear: "Draw",
    pronto: "Ready!",
    fim: "End of cycle!",
    instrucao: "Click Major or Minor."
  },
  es: {
    titulo: "Generador de Tonalidades",
    maior: "Mayores",
    menor: "Menores",
    quintas: "Quintas",
    quartas: "Cuartas",
    sortear: "Sortear",
    pronto: "¡Listo!",
    fim: "Fin del ciclo",
    instrucao: "Haz clic en Mayores o Menores."
  },
  fr: {
    titulo: "Générateur de tonalités",
    maior: "Majeures",
    menor: "Mineures",
    quintas: "Quintes",
    quartas: "Quartes",
    sortear: "Tirer",
    pronto: "Prêt !",
    fim: "Fin du cycle",
    instrucao: "Cliquez sur Majeures ou Mineures."
  }
};

function setLang(nova) {
  lang = nova;

  document.querySelectorAll(".flag").forEach(f => f.classList.remove("ativo"));
  event.target.classList.add("ativo");

  atualizarTextos();
}

function atualizarTextos() {
  let t = textos[lang];

  document.getElementById("titulo").innerText = t.titulo;
  document.getElementById("btn-maior").innerText = t.maior;
  document.getElementById("btn-menor").innerText = t.menor;
  document.getElementById("btn-quintas").innerText = t.quintas;
  document.getElementById("btn-quartas").innerText = t.quartas;
  document.getElementById("sortear").innerText = t.sortear;
}

// =========================
// LISTAS
// =========================

let maiores = [
  "C","G","D","A","E","B",
  "F♯ / G♭","D♭","A♭","E♭","B♭","F"
];

let menores = [
  "Cm","Gm","Dm","Am","Em","Bm",
  "F♯m","C♯m","G♯m","D♯m","A♯m","Fm"
];

// =========================
// ESTADO
// =========================

let listaAtual = [];
let embaralhadas = [];
let modoCiclo = "quintas";

// =========================
// LÓGICA
// =========================

function embaralhar(array) {
  for (let i = array.length - 1; i > 0; i--) {
    let j = Math.floor(Math.random() * (i + 1));
    [array[i], array[j]] = [array[j], array[i]];
  }
}

function iniciar() {
  embaralhadas = [...listaAtual];
  embaralhar(embaralhadas);
}

function atualizarBotoesTipo(tipo) {
  document.getElementById("btn-maior").classList.remove("ativo");
  document.getElementById("btn-menor").classList.remove("ativo");
  document.getElementById("btn-" + tipo).classList.add("ativo");
}

function atualizarBotoesModo() {
  document.getElementById("btn-quintas").classList.remove("ativo");
  document.getElementById("btn-quartas").classList.remove("ativo");
  document.getElementById("btn-" + modoCiclo).classList.add("ativo");
}

function selecionar(tipo) {
  listaAtual = (tipo === 'maior') ? maiores : menores;
  iniciar();
  atualizarBotoesTipo(tipo);

  document.getElementById("resultado").innerText = textos[lang].pronto;
  document.getElementById("ciclo").innerText = "";
}

function setModo(modo) {
  modoCiclo = modo;
  atualizarBotoesModo();
}

function gerarCiclo(tonica) {
  let index = listaAtual.indexOf(tonica);
  let ciclo = [];

  for (let i = 0; i < listaAtual.length; i++) {
    let pos = (modoCiclo === "quintas")
      ? (index + i) % listaAtual.length
      : (index - i + listaAtual.length) % listaAtual.length;

    ciclo.push(listaAtual[pos]);
  }

  return ciclo;
}

function sortear() {
  if (embaralhadas.length === 0) {
    document.getElementById("resultado").innerText = textos[lang].fim;
    document.getElementById("ciclo").innerText = textos[lang].instrucao;
    return;
  }

  let tonica = embaralhadas.pop();
  document.getElementById("resultado").innerText = tonica;

  let ciclo = gerarCiclo(tonica);
  document.getElementById("ciclo").innerText = ciclo.join(" → ");
}

// =========================
// INIT
// =========================

listaAtual = maiores;
iniciar();
atualizarBotoesTipo("maior");
atualizarBotoesModo();
atualizarTextos();

</script>

</body>
</html>
