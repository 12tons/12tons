<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Sorteador de Tonalidades</title>

<style>
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  text-align: center;
  margin: 15px;
  background-color: #f4f6f8;
}

button {
  margin: 4px;
  padding: 8px 12px;
  border-radius: 6px;
  border: 1px solid #bbb;
  background: white;
  cursor: pointer;
}

button:hover { background: #eee; }

.ativo {
  background: #2b2b2b;
  color: white;
}

#sortear {
  width: 70px;
  height: 70px;
  border-radius: 50%;
  background: #b71c1c;
  color: white;
  border: none;
}

#resultado {
  font-size: 32px;
  margin-top: 10px;
}

.linha {
  display: grid;
  grid-template-columns: 110px repeat(7, 1fr);
  margin: 6px 0;
  padding: 6px;
}

.linha:nth-child(even) { background: #edf2f7; }

.tonica {
  font-size: 22px;
  font-weight: 700;
  border-right: 3px solid #4a90e2;
  padding-right: 8px;
}

.acorde {
  font-size: 22px;
}

.acorde:not(:last-child) {
  border-right: 1px solid #ccc;
}
</style>
</head>

<body>

<h2>Sorteador de Tonalidades</h2>

<div>
<button id="triade" onclick="setAcorde('triade')">Tríades</button>
<button id="tetrade" onclick="setAcorde('tetrade')">Tétrades</button>
</div>

<div>
<button id="maior" onclick="selecionar('maior')">Maiores</button>
<button id="menor" onclick="selecionar('menor')">Menores</button>
</div>

<div id="submenu" style="display:none;">
<button id="nat" onclick="setMenor('natural')">Natural</button>
<button id="har" onclick="setMenor('harmonica')">Harmônica</button>
<button id="mel" onclick="setMenor('melodica')">Melódica</button>
</div>

<div>
<button id="q" onclick="setModo('quintas')">Quintas</button>
<button id="4" onclick="setModo('quartas')">Quartas</button>
<button id="ca" onclick="setModo('asc')">Crom ↑</button>
<button id="cd" onclick="setModo('desc')">Crom ↓</button>
<button id="r" onclick="setModo('rand')">Rand</button>
</div>

<button id="sortear" onclick="sortear()">Sortear</button>
<button onclick="resetar()">Zerar</button>

<div id="resultado">—</div>
<div id="ciclo"></div>

<script>

const ciclo = ["C","G","D","A","E","B","F#","Db","Ab","Eb","Bb","F"];

let listaAtual = [];
let embaralhadas = [];
let modo = "quintas";
let menorModo = "natural";
let tipo = "tetrade";

/* ===== UI ===== */

function ativar(id, grupo){
  grupo.forEach(g=>document.getElementById(g).classList.remove("ativo"));
  document.getElementById(id).classList.add("ativo");
}

/* ===== CONTROLES ===== */

function setAcorde(t){
  tipo = t;
  ativar(t, ["triade","tetrade"]);
}

function selecionar(t){
  ativar(t, ["maior","menor"]);

  if(t==="maior"){
    listaAtual = ciclo.slice();
    document.getElementById("submenu").style.display="none";
  } else {
    listaAtual = ciclo.map(n=>n+"m");
    document.getElementById("submenu").style.display="block";
  }

  iniciar();
}

function setModo(m){
  modo = m;
  ativar(
    m==="quintas"?"q":
    m==="quartas"?"4":
    m==="asc"?"ca":
    m==="desc"?"cd":"r",
    ["q","4","ca","cd","r"]
  );
}

function setMenor(m){
  menorModo = m;
  ativar(
    m==="natural"?"nat":
    m==="harmonica"?"har":"mel",
    ["nat","har","mel"]
  );
}

/* ===== CORE ===== */

function embaralhar(a){
  for(let i=a.length-1;i>0;i--){
    let j=Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
}

function iniciar(){
  embaralhadas = listaAtual.slice();
  embaralhar(embaralhadas);
}

function resetar(){
  iniciar();
  document.getElementById("ciclo").innerHTML="";
}

/* ===== HARMONIA ===== */

const letras = ["C","D","E","F","G","A","B"];
const semi = {C:0,D:2,E:4,F:5,G:7,A:9,B:11};

function nota(l,a){
  let d=(a-semi[l]+12)%12;
  if(d===0) return l;
  if(d===1) return l+"#";
  if(d===11) return l+"b";
  return l;
}

function escala(t,int){
  let base=t.replace("m","");
  let l=base[0];
  let idx=letras.indexOf(l);
  let s=semi[l];
  if(base.includes("#")) s++;
  if(base.includes("b")) s--;

  let e=[];
  for(let i=0;i<7;i++){
    let letra=letras[(idx+i)%7];
    e.push(nota(letra,(s+int[i])%12));
  }
  return e;
}

function campo(t){
  const M=[0,2,4,5,7,9,11];
  const mN=[0,2,3,5,7,8,10];
  const mH=[0,2,3,5,7,8,11];
  const mM=[0,2,3,5,7,9,11];

  if(!t.includes("m")){
    let e=escala(t,M);
    return [e[0]+"7M",e[1]+"m7",e[2]+"m7",e[3]+"7M",e[4]+"7",e[5]+"m7",e[6]+"ø"];
  }

  if(menorModo==="natural"){
    let e=escala(t,mN);
    return [e[0]+"m7",e[1]+"ø",e[2]+"7M",e[3]+"m7",e[4]+"m7",e[5]+"7M",e[6]+"7"];
  }

  if(menorModo==="harmonica"){
    let e=escala(t,mH);
    return [e[0]+"m(7M)",e[1]+"ø",e[2]+"7M(#5)",e[3]+"m7",e[4]+"7",e[5]+"7M",e[6]+"°"];
  }

  let e=escala(t,mM);
  return [e[0]+"m7M6",e[1]+"m7",e[2]+"maj7(#5)",e[3]+"7(#11)",e[4]+"7(b13)",e[5]+"ø",e[6]+"ø"];
}

/* ===== CICLO ===== */

function gerar(t){

  if(modo==="rand"){
    return embaralhar(listaAtual.slice());
  }

  if(modo==="asc"||modo==="desc"){
    const crom=["C","C#","D","D#","E","F","F#","G","G#","A","Bb","B"];
    let b=t.replace("m","");
    let i=crom.indexOf(b);

    let o=[];
    for(let k=0;k<12;k++){
      let p=modo==="asc"?(i+k)%12:(i-k+12)%12;
      let n=crom[p];
      if(t.includes("m")) n+="m";
      o.push(n);
    }
    return o;
  }

  let i=listaAtual.indexOf(t);
  let o=[];
  for(let k=0;k<12;k++){
    o.push(listaAtual[modo==="quartas"?(i-k+12)%12:(i+k)%12]);
  }
  return o;
}

/* ===== RENDER ===== */

function sortear(){

  if(embaralhadas.length===0) iniciar();

  let t=embaralhadas.pop();
  document.getElementById("resultado").innerText=t;

  let html="";
  gerar(t).forEach(ton=>{
    html+="<div class='linha'><div class='tonica'>"+ton+"</div>"+
    campo(ton).map(a=>"<div class='acorde'>"+a+"</div>").join("")+
    "</div>";
  });

  document.getElementById("ciclo").innerHTML=html;
}

/* INIT */

setAcorde("tetrade");
selecionar("maior");
setModo("quintas");

</script>

</body>
</html>
