<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Sorteador de Tonalidades</title>
  <style>
    body {
      font-family: sans-serif;
      text-align: center;
      margin-top: 40px;
    }
    button {
      font-size: 18px;
      padding: 10px 15px;
      margin: 5px;
      cursor: pointer;
    }
    #resultado {
      font-size: 32px;
      margin-top: 20px;
    }
    #ciclo {
      margin-top: 20px;
      font-size: 18px;
      line-height: 1.6;
    }
  </style>
</head>
<body>

<h1>Sorteador de Tonalidades</h1>

<div>
  <button onclick="selecionar('maior')">Maiores</button>
  <button onclick="selecionar('menor')">Menores</button>
</div>

<div>
  <button onclick="setModo('quintas')">Quintas</button>
  <button onclick="setModo('quartas')">Quartas</button>
</div>

<button onclick="sortear()">Sortear</button>

<div id="resultado">‚Äî</div>
<div id="ciclo"></div>

<script>
// =========================
// LISTAS
// =========================

let maiores = [
  "C", "G", "D", "A", "E", "B",
  "F‚ôØ / G‚ô≠", "D‚ô≠", "A‚ô≠", "E‚ô≠", "B‚ô≠", "F"
];

// ciclo de quintas em MENOR (corrigido)
let menores = [
  "Cm", "Gm", "Dm", "Am", "Em", "Bm",
  "F‚ôØm", "C‚ôØm", "G‚ôØm", "D‚ôØm", "A‚ôØm", "Fm"
];

// =========================
// ESTADO
// =========================

let listaAtual = [];
let embaralhadas = [];
let modoCiclo = "quintas"; // ou "quartas"

// =========================
// FUN√á√ïES
// =========================

function embaralhar(array) {
  for (let i = array.length - 1; i > 0; i--) {
    let j = Math.floor(Math.random() * (i + 1));
    [array[i], array[j]] = [array[j], array[i]];
  }
}

function iniciar() {
  embaralhadas = [...listaAtual];
  embaralhar(embaralhadas);
}

function selecionar(tipo) {
  listaAtual = (tipo === 'maior') ? maiores : menores;
  iniciar();
  document.getElementById("resultado").innerText = "Pronto!";
  document.getElementById("ciclo").innerText = "";
}

function setModo(modo) {
  modoCiclo = modo;
}

function gerarCiclo(tonica) {
  let index = listaAtual.indexOf(tonica);
  let ciclo = [];

  for (let i = 0; i < listaAtual.length; i++) {
    let pos;

    if (modoCiclo === "quintas") {
      pos = (index + i) % listaAtual.length;
    } else {
      pos = (index - i + listaAtual.length) % listaAtual.length;
    }

    ciclo.push(listaAtual[pos]);
  }

  return ciclo;
}

function sortear() {
  if (embaralhadas.length === 0) {
    document.getElementById("resultado").innerText = "Fim do ciclo!";
    document.getElementById("ciclo").innerText = "Clique em Maiores ou Menores para recome√ßar.";
    return;
  }

  let tonica = embaralhadas.pop();
  document.getElementById("resultado").innerText = tonica;

  let ciclo = gerarCiclo(tonica);
  document.getElementById("ciclo").innerText = ciclo.join(" ‚Üí ");
}

// =========================
// INICIALIZA√á√ÉO
// =========================

listaAtual = maiores;
iniciar();
</script>

</body>
</html>
