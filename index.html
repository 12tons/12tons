<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Sorteador de Tonalidades</title>

<style>
body {
  font-family: Arial, sans-serif;
  text-align: center;
  margin: 15px;
  background-color: #f4f6f8;
}

button {
  margin: 4px;
  padding: 8px 12px;
  font-size: 14px;
  border-radius: 6px;
  border: 1px solid #555;
  background: white;
  cursor: pointer;
}

button:hover { background: #eaeaea; }

.ativo {
  background: #222;
  color: white;
}

#sortear {
  margin-top: 10px;
  width: 100px;
  height: 100px;
  border-radius: 50%;
  background: #d62828;
  color: #ffd60a;
  border: none;
  font-size: 18px;
}

#zerar {
  margin-top: 10px;
  background: #444;
  color: white;
}

#resultado {
  font-size: 34px;
  margin-top: 10px;
}

#ciclo {
  margin-top: 15px;
  font-size: 28px;
  max-width: 1000px;
  margin-inline: auto;
}

.linha {
  display: grid;
  grid-template-columns: 80px repeat(7, 1fr);
  align-items: center;
  margin-bottom: 10px;
  gap: 10px;
}

.tonica {
  font-weight: bold;
  text-align: left;
}

.acorde {
  text-align: center;
}
</style>
</head>

<body>

<h1>Sorteador de Tonalidades</h1>

<div>
  <button id="btn-triade" onclick="setAcorde('triade')">Tríades</button>
  <button id="btn-tetrade" onclick="setAcorde('tetrade')">Tétrades</button>
</div>

<div>
  <button id="btn-maior" onclick="selecionar('maior')">Maiores</button>
  <button id="btn-menor" onclick="selecionar('menor')">Menores</button>
</div>

<div id="submenuMenor" style="display:none;">
  <button id="btn-natural" onclick="setMenorModo('natural')">Menor natural</button>
  <button id="btn-harmonica" onclick="setMenorModo('harmonica')">Menor harmônica</button>
</div>

<div>
  <button id="btn-quintas" onclick="setModo('quintas')">Quintas</button>
  <button id="btn-quartas" onclick="setModo('quartas')">Quartas</button>
  <button id="btn-cromA" onclick="setModo('cromaticoAsc')">Crom ↑</button>
  <button id="btn-cromD" onclick="setModo('cromaticoDesc')">Crom ↓</button>
</div>

<button id="sortear" onclick="sortear()">Sortear</button>
<br>
<button id="zerar" onclick="resetar()">Zerar</button>

<div id="resultado">—</div>
<div id="ciclo"></div>

<script>

const letras=["C","D","E","F","G","A","B"];
const semitons={"C":0,"D":2,"E":4,"F":5,"G":7,"A":9,"B":11};

let tipoAcorde="triade";
let listaAtual=[],embaralhadas=[],modo="quintas",menorModo="natural";

const ciclo=["C","G","D","A","E","B","F#","Db","Ab","Eb","Bb","F"];

function resetar(){
  iniciar();
  document.getElementById("resultado").innerText="—";
  document.getElementById("ciclo").innerHTML="";
}

function limparAtivos(ids){
  ids.forEach(id=>document.getElementById(id).classList.remove("ativo"));
}

function setAcorde(tipo){
  limparAtivos(["btn-triade","btn-tetrade"]);
  tipoAcorde=tipo;
  document.getElementById("btn-"+tipo).classList.add("ativo");
}

function selecionar(tipo){
  limparAtivos(["btn-maior","btn-menor"]);

  if(tipo==="maior"){
    listaAtual=ciclo;
    document.getElementById("submenuMenor").style.display="none";
    document.getElementById("btn-maior").classList.add("ativo");
  } else {
    listaAtual=ciclo.map(n=>n+"m");
    document.getElementById("submenuMenor").style.display="block";
    document.getElementById("btn-menor").classList.add("ativo");
  }

  iniciar();
}

function setModo(m){
  limparAtivos(["btn-quintas","btn-quartas","btn-cromA","btn-cromD"]);
  modo=m;
  document.getElementById(
    m==="quintas"?"btn-quintas":
    m==="quartas"?"btn-quartas":
    m==="cromaticoAsc"?"btn-cromA":"btn-cromD"
  ).classList.add("ativo");
}

function setMenorModo(m){
  limparAtivos(["btn-natural","btn-harmonica"]);
  menorModo=m;
  document.getElementById("btn-"+m).classList.add("ativo");
}

function iniciar(){
  embaralhadas=[...listaAtual];
  embaralhar(embaralhadas);
}

function embaralhar(a){
  for(let i=a.length-1;i>0;i--){
    let j=Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
}

function nota(letra, alvo){
  let base=semitons[letra];
  let diff=(alvo-base+12)%12;

  if(diff===0) return letra;
  if(diff===1) return letra+"#";
  if(diff===11) return letra+"b";
  return letra;
}

function escala(tonica,intervalos){
  let base=tonica.replace("m","");
  let l=base[0];
  let idxL=letras.indexOf(l);

  let baseSemi=semitons[l];
  if(base.includes("#")) baseSemi++;
  if(base.includes("b")) baseSemi--;

  let esc=[];

  for(let i=0;i<7;i++){
    let letra=letras[(idxL+i)%7];
    let alvo=(baseSemi+intervalos[i])%12;
    esc.push(nota(letra,alvo));
  }

  return esc;
}

  let maior=[0,2,4,5,7,9,11];
  let menorNat=[0,2,3,5,7,8,10];
  let menorHar=[0,2,3,5,7,8,11];

  if(!tonica.includes("m")){
    let e=
