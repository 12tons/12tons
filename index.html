<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Sorteador de Tonalidades</title>

<style>
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  text-align: center;
  margin: 15px;
  background-color: #f4f6f8;
  color: #222;
}

h1 { font-weight: 600; }

button {
  margin: 4px;
  padding: 8px 12px;
  font-size: 14px;
  border-radius: 6px;
  border: 1px solid #bbb;
  background: #ffffff;
  cursor: pointer;
}

button:hover { background: #eceff1; }

.ativo {
  background: #2b2b2b;
  color: white;
}

#sortear {
  margin-top: 12px;
  width: 70px;
  height: 70px;
  border-radius: 50%;
  background: #b71c1c;
  color: white;
  border: none;
  font-weight: 600;
}

#zerar {
  margin-top: 8px;
  background: #555;
  color: white;
  border: none;
}

#resultado {
  font-size: 32px;
  font-weight: 600;
  margin-top: 10px;
}

#ciclo {
  margin-top: 15px;
  max-width: 1100px;
  margin-inline: auto;
}

.linha {
  display: grid;
  grid-template-columns: 110px repeat(7, 1fr);
  margin-bottom: 8px;
  padding: 8px;
  border-radius: 6px;
}

.linha:nth-child(even) { background: #edf2f7; }

.tonica {
  font-weight: 700;
  font-size: 22px;
  text-align: left;
  padding: 6px 10px;
  border-right: 3px solid #4a90e2;
}

.acorde {
  font-size: 22px;
  text-align: center;
  padding: 6px;
}

.acorde:not(:last-child) {
  border-right: 1px solid #d6dde5;
}
</style>
</head>

<body>

<h1>Sorteador de Tonalidades</h1>

<div>
  <button onclick="setAcorde('triade')" id="btnTriade">Tríades</button>
  <button onclick="setAcorde('tetrade')" id="btnTetrade">Tétrades</button>
</div>

<div>
  <button onclick="selecionar('maior')" id="btnMaior">Maiores</button>
  <button onclick="selecionar('menor')" id="btnMenor">Menores</button>
</div>

<div id="submenuMenor" style="display:none;">
  <button onclick="setMenorModo('natural')" id="btnNat">Natural</button>
  <button onclick="setMenorModo('harmonica')" id="btnHar">Harmônica</button>
  <button onclick="setMenorModo('melodica')" id="btnMel">Melódica</button>
</div>

<div>
  <button onclick="setModo('quintas')">Quintas</button>
  <button onclick="setModo('quartas')">Quartas</button>
  <button onclick="setModo('cromaticoAsc')">Crom ↑</button>
  <button onclick="setModo('cromaticoDesc')">Crom ↓</button>
  <button onclick="setModo('random')">Randômico</button>
</div>

<button id="sortear" onclick="sortear()">Sortear</button><br>
<button id="zerar" onclick="resetar()">Zerar</button>

<div id="resultado">—</div>
<div id="ciclo"></div>

<script>

/* ===== DADOS ===== */

const ciclo = ["C","G","D","A","E","B","F#","Db","Ab","Eb","Bb","F"];

let listaAtual = [];
let embaralhadas = [];
let modo = "quintas";
let menorModo = "natural";

/* ===== CONTROLES ===== */

function setAcorde(t){}
function setModo(m){ modo = m; }
function setMenorModo(m){ menorModo = m; }

function selecionar(tipo){
  if(tipo==="maior"){
    listaAtual = ciclo.slice();
    document.getElementById("submenuMenor").style.display="none";
  } else {
    listaAtual = ciclo.map(n=>n+"m");
    document.getElementById("submenuMenor").style.display="block";
  }
  iniciar();
}

/* ===== CORE ===== */

function embaralhar(a){
  for(let i=a.length-1;i>0;i--){
    let j=Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
}

function iniciar(){
  embaralhadas = listaAtual.slice();
  embaralhar(embaralhadas);
}

function resetar(){
  iniciar();
  document.getElementById("resultado").innerText="—";
  document.getElementById("ciclo").innerHTML="";
}

/* ===== ESCALA ===== */

const letras = ["C","D","E","F","G","A","B"];
const semitons = {C:0,D:2,E:4,F:5,G:7,A:9,B:11};

function nota(letra, alvo){
  let base = semitons[letra];
  let diff = (alvo - base + 12) % 12;

  if(diff===0) return letra;
  if(diff===1) return letra+"#";
  if(diff===11) return letra+"b";
  return letra;
}

function escala(tonica, intervalos){
  let base = tonica.replace("m","");
  let l = base[0];
  let idx = letras.indexOf(l);

  let semi = semitons[l];
  if(base.includes("#")) semi++;
  if(base.includes("b")) semi--;

  let esc=[];

  for(let i=0;i<7;i++){
    let letra = letras[(idx+i)%7];
    let alvo = (semi + intervalos[i]) % 12;
    esc.push(nota(letra,alvo));
  }

  return esc;
}

/* ===== CAMPO HARMÔNICO ===== */

function campo(t){

  const maior=[0,2,4,5,7,9,11];
  const menorNat=[0,2,3,5,7,8,10];
  const menorHar=[0,2,3,5,7,8,11];
  const menorMel=[0,2,3,5,7,9,11];

  if(!t.includes("m")){
    let e=escala(t,maior);
    return [
      e[0]+"7M",
      e[1]+"m7",
      e[2]+"m7",
      e[3]+"7M",
      e[4]+"7",
      e[5]+"m7",
      e[6]+"ø"
    ];
  }

  if(menorModo==="natural"){
    let e=escala(t,menorNat);
    return [
      e[0]+"m7",
      e[1]+"ø",
      e[2]+"7M",
      e[3]+"m7",
      e[4]+"m7",
      e[5]+"7M",
      e[6]+"7"
    ];
  }

  if(menorModo==="harmonica"){
    let e=escala(t,menorHar);
    return [
      e[0]+"m(7M)",
      e[1]+"ø",
      e[2]+"7M(#5)",
      e[3]+"m7",
      e[4]+"7",
      e[5]+"7M",
      e[6]+"°"
    ];
  }

  if(menorModo==="melodica"){
    let e=escala(t,menorMel);
    return [
      e[0]+"m7M6",
      e[1]+"m7",
      e[2]+"maj7(#5)",
      e[3]+"7(#11)",
      e[4]+"7(b13)",
      e[5]+"ø",
      e[6]+"ø"
    ];
  }
}

/* ===== CICLO ===== */

function gerarCiclo(t){

  if(modo==="random"){
    return embaralhar(listaAtual.slice());
  }

  if(modo==="cromaticoAsc" || modo==="cromaticoDesc"){
    const crom = ["C","C#","D","D#","E","F","F#","G","G#","A","Bb","B"];
    let base = t.replace("m","");
    let idx = crom.indexOf(base);

    let out=[];

    for(let i=0;i<12;i++){
      let pos = modo==="cromaticoAsc"
        ? (idx+i)%12
        : (idx-i+12)%12;

      let n = crom[pos];
      if(t.includes("m")) n+="m";
      out.push(n);
    }

    return out;
  }

  let base = listaAtual.indexOf(t);
  let out=[];

  for(let i=0;i<12;i++){
    let pos = modo==="quartas"
      ? (base-i+12)%12
      : (base+i)%12;

    out.push(listaAtual[pos]);
  }

  return out;
}

/* ===== RENDER ===== */

function sortear(){

  if(embaralhadas.length===0){
    iniciar();
  }

  let t = embaralhadas.pop();
  document.getElementById("resultado").innerText = t;

  let html="";

  gerarCiclo(t).forEach(ton=>{
    let acordes = campo(ton)
      .map(a=>"<div class='acorde'>"+a+"</div>")
      .join("");

    html += "<div class='linha'><div class='tonica'>"+ton+"</div>"+acordes+"</div>";
  });

  document.getElementById("ciclo").innerHTML = html;
}

/* INIT */

selecionar("maior");

</script>

</body>
</html>
