<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Sorteador de Tonalidades</title>
  <style>
    body {
      font-family: sans-serif;
      text-align: center;
      margin-top: 40px;
    }
    button {
      font-size: 18px;
      padding: 10px 15px;
      margin: 5px;
    }
    #resultado {
      font-size: 32px;
      margin-top: 20px;
    }
    #ciclo {
      margin-top: 20px;
      font-size: 18px;
      line-height: 1.6;
    }
  </style>
</head>
<body>

<h1>Sorteador de Tonalidades</h1>

<div>
  <button onclick="selecionar('maior')">Maiores</button>
  <button onclick="selecionar('menor')">Menores</button>
</div>

<button onclick="sortear()">Sortear</button>

<div id="resultado">—</div>
<div id="ciclo"></div>

<script>
let maiores = [
  "C",
  "G",
  "D",
  "A",
  "E",
  "B",
  "F♯ / G♭",
  "D♭",
  "A♭",
  "E♭",
  "B♭",
  "F"
];

let menores = [
  "A",
  "E",
  "B",
  "F♯",
  "C♯",
  "G♯",
  "D♯ / E♭",
  "B♭",
  "F",
  "C",
  "G",
  "D"
];

let listaAtual = [];
let embaralhadas = [];

function embaralhar(array) {
  for (let i = array.length - 1; i > 0; i--) {
    let j = Math.floor(Math.random() * (i + 1));
    [array[i], array[j]] = [array[j], array[i]];
  }
}

function iniciar() {
  embaralhadas = [...listaAtual];
  embaralhar(embaralhadas);
}

function selecionar(tipo) {
  listaAtual = (tipo === 'maior') ? maiores : menores;
  iniciar();
  document.getElementById("resultado").innerText = "Pronto!";
  document.getElementById("ciclo").innerText = "";
}

function gerarCiclo(tonica) {
  let index = listaAtual.indexOf(tonica);
  let ciclo = [];

  for (let i = 0; i < listaAtual.length; i++) {
    ciclo.push(listaAtual[(index + i) % listaAtual.length]);
  }

  return ciclo;
}

function sortear() {
  if (embaralhadas.length === 0) {
    document.getElementById("resultado").innerText = "Fim do ciclo!";
    document.getElementById("ciclo").innerText = "Clique em Maiores ou Menores para recomeçar.";
    return;
  }

  let tonica = embaralhadas.pop();
  document.getElementById("resultado").innerText = tonica;

  let ciclo = gerarCiclo(tonica);
  document.getElementById("ciclo").innerText = ciclo.join(" → ");
}

// padrão inicial
listaAtual = maiores;
iniciar();
</script>

</body>
</html>
