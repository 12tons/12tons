<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Sorteador de Tonalidades</title>

<style>
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  text-align: center;
  margin: 15px;
  background-color: #f4f6f8;
  color: #222;
}

h1 {
  font-weight: 600;
  margin-bottom: 10px;
}

button {
  margin: 4px;
  padding: 8px 12px;
  font-size: 14px;
  border-radius: 6px;
  border: 1px solid #bbb;
  background: #ffffff;
  cursor: pointer;
}

button:hover { background: #eceff1; }

.ativo {
  background: #2b2b2b;
  color: white;
}

#sortear {
  margin-top: 12px;
  width: 80px;
  height: 80px;
  border-radius: 50%;
  background: #b71c1c;
  color: #fff;
  border: none;
  font-weight: 600;
}

#zerar {
  margin-top: 8px;
  background: #555;
  color: white;
  border: none;
}

#tituloOrdem {
  margin-top: 15px;
  font-size: 18px;
  font-weight: 600;
}

#ordem {
  margin-top: 6px;
  font-size: 20px;
}

#armadura {
  font-size: 16px;
  margin-top: 4px;
  color: #555;
}

#ciclo {
  margin-top: 18px;
  max-width: 1100px;
  margin-inline: auto;
}

.linha {
  display: grid;
  grid-template-columns: 110px repeat(7, 1fr);
  margin-bottom: 10px;
  padding: 10px;
  border-radius: 6px;
}

.linha:nth-child(even) { background: #edf2f7; }
.linha:nth-child(odd) { background: #fff; }

.tonica {
  font-weight: 700;
  font-size: 22px;
  text-align: left;
  padding: 8px 12px;
  border-right: 3px solid #c8d0d8;
}

.acorde {
  text-align: center;
  font-size: 22px;
  padding: 8px 10px;
}

.acorde:not(:last-child) {
  border-right: 1px solid #d6dde5;
}
</style>
</head>

<body>

<h1>Sorteador de Tonalidades</h1>

<div>
  <button id="btn-triade" onclick="setAcorde('triade')">Tríades</button>
  <button id="btn-tetrade" onclick="setAcorde('tetrade')">Tétrades</button>
</div>

<div>
  <button id="btn-maior" onclick="selecionar('maior')">Maiores</button>
  <button id="btn-menor" onclick="selecionar('menor')">Menores</button>
</div>

<div id="submenuMenor" style="display:none;">
  <button id="btn-natural" onclick="setMenorModo('natural')">Natural</button>
  <button id="btn-harmonica" onclick="setMenorModo('harmonica')">Harmônica</button>
  <button id="btn-melodica" onclick="setMenorModo('melodica')">Melódica</button>
</div>

<div>
  <button id="btn-quintas" onclick="setModo('quintas')">Quintas</button>
  <button id="btn-quartas" onclick="setModo('quartas')">Quartas</button>
  <button id="btn-cromA" onclick="setModo('cromaticoAsc')">Crom ↑</button>
  <button id="btn-cromD" onclick="setModo('cromaticoDesc')">Crom ↓</button>
  <button id="btn-random" onclick="setModo('random')">Rand</button>
</div>

<button id="sortear" onclick="sortear()">Sortear</button><br>
<button id="zerar" onclick="resetar()">Zerar</button>

<div id="tituloOrdem">Ordem do dia</div>
<div id="ordem">—</div>
<div id="armadura"></div>

<div id="ciclo"></div>

<script>

const ciclo = ["C","G","D","A","E","B","F#","Db","Ab","Eb","Bb","F"];

const armaduras = {
  "C":{tipo:"n",qtd:0},
  "G":{tipo:"#",qtd:1},
  "D":{tipo:"#",qtd:2},
  "A":{tipo:"#",qtd:3},
  "E":{tipo:"#",qtd:4},
  "B":{tipo:"#",qtd:5},
  "F#":{tipo:"#",qtd:6},
  "Db":{tipo:"b",qtd:5},
  "Ab":{tipo:"b",qtd:4},
  "Eb":{tipo:"b",qtd:3},
  "Bb":{tipo:"b",qtd:2},
  "F":{tipo:"b",qtd:1}
};

let tipoAcorde="tetrade";
let listaAtual=[];
let embaralhadas=[];
let modo="quintas";
let menorModo="natural";

const letras=["C","D","E","F","G","A","B"];
const semitons={C:0,D:2,E:4,F:5,G:7,A:9,B:11};

function limparAtivos(ids){
  ids.forEach(id=>document.getElementById(id).classList.remove("ativo"));
}

function setAcorde(t){
  tipoAcorde=t;
  limparAtivos(["btn-triade","btn-tetrade"]);
  document.getElementById("btn-"+t).classList.add("ativo");
}

function selecionar(t){
  limparAtivos(["btn-maior","btn-menor"]);

  if(t==="maior"){
    listaAtual=ciclo.slice();
    document.getElementById("submenuMenor").style.display="none";
  } else {
    listaAtual=ciclo.map(n=>n+"m");
    document.getElementById("submenuMenor").style.display="block";
  }

  document.getElementById("btn-"+t).classList.add("ativo");
  iniciar();
}

function setModo(m){
  modo=m;
  limparAtivos(["btn-quintas","btn-quartas","btn-cromA","btn-cromD","btn-random"]);
  document.getElementById("btn-"+(m==="cromaticoAsc"?"cromA":m==="cromaticoDesc"?"cromD":m)).classList.add("ativo");
}

function setMenorModo(m){
  menorModo=m;
  limparAtivos(["btn-natural","btn-harmonica","btn-melodica"]);
  document.getElementById("btn-"+m).classList.add("ativo");
}

function embaralhar(a){
  for(let i=a.length-1;i>0;i--){
    let j=Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
}

function iniciar(){
  embaralhadas=listaAtual.slice();
  embaralhar(embaralhadas);
}

function resetar(){
  iniciar();
  document.getElementById("ordem").innerText="—";
  document.getElementById("ciclo").innerHTML="";
  document.getElementById("armadura").innerText="";
}

function mostrarArmadura(t){
  let base=t.replace("m","");
  let arm=armaduras[base];
  if(!arm){document.getElementById("armadura").innerText="";return;}
  let s=arm.tipo==="#"?"♯":"♭";
  document.getElementById("armadura").innerText = arm.qtd===0?"sem acidentes":s.repeat(arm.qtd);
}

function corrigirEnarmonia(n){
  return n
    .replace("E#","F")
    .replace("B#","C")
    .replace("Cb","B")
    .replace("Fb","E");
}

function nota(letra, alvo, usarBemol){
  let base=semitons[letra];
  if(base%12===alvo) return letra;
  if(usarBemol){
    if((base+11)%12===alvo) return letra+"b";
    if((base+1)%12===alvo) return letra+"#";
  } else {
    if((base+1)%12===alvo) return letra+"#";
    if((base+11)%12===alvo) return letra+"b";
  }
  return letra;
}

function escala(t,ints){
  let base=t.replace("m","");
  let l=base[0];
  let idx=letras.indexOf(l);

  let usarBemol = armaduras[base]?.tipo==="b";

  let semi=semitons[l];
  if(base.includes("#")) semi++;
  if(base.includes("b")) semi--;
  semi=(semi+12)%12;

  let esc=[];
  for(let i=0;i<7;i++){
    let letra=letras[(idx+i)%7];
    let alvo=(semi+ints[i])%12;
    esc.push(corrigirEnarmonia(nota(letra,alvo,usarBemol)));
  }
  return esc;
}

function campo(t){

  const maior=[0,2,4,5,7,9,11];
  const nat=[0,2,3,5,7,8,10];
  const har=[0,2,3,5,7,8,11];
  const mel=[0,2,3,5,7,9,11];

  let e;

  if(!t.includes("m")){
    e=escala(t,maior);
    return [e[0]+"7M",e[1]+"m7",e[2]+"m7",e[3]+"7M",e[4]+"7",e[5]+"m7",e[6]+"ø"];
  }

  if(menorModo==="natural"){
    e=escala(t,nat);
    return [e[0]+"m7",e[1]+"ø",e[2]+"7M",e[3]+"m7",e[4]+"m7",e[5]+"7M",e[6]+"7"];
  }

  if(menorModo==="harmonica"){
    e=escala(t,har);
    return [e[0]+"m(7M)",e[1]+"ø",e[2]+"7M(#5)",e[3]+"m7",e[4]+"7",e[5]+"7M",e[6]+"°"];
  }

  if(menorModo==="melodica"){
    e=escala(t,mel);
    return [e[0]+"m7M6",e[1]+"m7",e[2]+"maj7(#5)",e[3]+"7(#11)",e[4]+"7(b13)",e[5]+"ø",e[6]+"ø"];
  }
}

function gerarCiclo(t){

  if(modo==="random"){
    return embaralhar(listaAtual.slice());
  }

  if(modo==="cromaticoAsc"||modo==="cromaticoDesc"){

    const sharp=["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"];
    const flat=["C","Db","D","Eb","E","F","Gb","G","Ab","A","Bb","B"];

    let base=t.replace("m","");
    let usarBemol=armaduras[base]?.tipo==="b";
    let crom=usarBemol?flat:sharp;

    let idx=crom.indexOf(base);
    if(idx===-1){crom=sharp;idx=crom.indexOf(base);}

    let out=[];
    for(let i=0;i<12;i++){
      let pos=modo==="cromaticoAsc"?(idx+i)%12:(idx-i+12)%12;
      let n=crom[pos];
      if(t.includes("m")) n+="m";
      out.push(corrigirEnarmonia(n));
    }
    return out;
  }

  let i=listaAtual.indexOf(t);
  let out=[];
  for(let k=0;k<12;k++){
    let p=modo==="quartas"?(i-k+12)%12:(i+k)%12;
    out.push(listaAtual[p]);
  }
  return out;
}

function sortear(){

  if(embaralhadas.length===0) iniciar();

  let t=embaralhadas.pop();

  let ordemAtual = gerarCiclo(t);
  document.getElementById("ordem").innerText = ordemAtual.join(" → ");

  mostrarArmadura(t);

  let html="";
  ordemAtual.forEach(function(ton){
    let acordes=campo(ton).map(a=>"<div class='acorde'>"+a+"</div>").join("");
    html+="<div class='linha'><div class='tonica'>"+ton+"</div>"+acordes+"</div>";
  });

  document.getElementById("ciclo").innerHTML=html;
}

setAcorde("tetrade");
selecionar("maior");
setModo("quintas");

</script>

</body>
</html>
