<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Sorteador de Tonalidades</title>

<style>
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  text-align: center;
  margin: 15px;
  background-color: #f4f6f8;
  color: #222;
}

h1 {
  font-weight: 600;
  margin-bottom: 10px;
}

button {
  margin: 4px;
  padding: 8px 12px;
  font-size: 14px;
  border-radius: 6px;
  border: 1px solid #bbb;
  background: #ffffff;
  cursor: pointer;
}

button:hover { background: #eceff1; }

.ativo {
  background: #2b2b2b;
  color: white;
}

#sortear {
  margin-top: 12px;
  width: 80px;
  height: 80px;
  border-radius: 50%;
  background: #b71c1c;
  color: white;
  border: none;
  font-weight: 600;
}

#zerar {
  margin-top: 8px;
  background: #555;
  color: white;
  border: none;
}

#resultado {
  font-size: 34px;
  font-weight: 600;
  margin-top: 12px;
}

#ciclo {
  margin-top: 18px;
  max-width: 1100px;
  margin-inline: auto;
}

/* LINHA */
.linha {
  display: grid;
  grid-template-columns: 110px repeat(7, 1fr);
  gap: 0;
  margin-bottom: 10px;
  padding: 10px;
  border-radius: 6px;
}

.linha:nth-child(even) { background-color: #edf2f7; }
.linha:nth-child(odd) { background-color: #ffffff; }

/* TÔNICA */
.tonica {
  font-weight: 700;
  font-size: 22px;
  text-align: left;
  padding: 6px 10px;
  border-right: 3px solid #4a90e2;
}

/* ACORDES */
.acorde {
  text-align: center;
  font-size: 22px;
  font-weight: 500;
  padding: 6px 8px;
}

.acorde:not(:last-child) {
  border-right: 1px solid #d6dde5;
}

</style>
</head>

<body>

<h1>Sorteador de Tonalidades</h1>

<div>
  <button onclick="setAcorde('triade')">Tríades</button>
  <button onclick="setAcorde('tetrade')">Tétrades</button>
</div>

<div>
  <button onclick="selecionar('maior')">Maiores</button>
  <button onclick="selecionar('menor')">Menores</button>
</div>

<div id="submenuMenor" style="display:none;">
  <button onclick="setMenorModo('natural')">Menor natural</button>
  <button onclick="setMenorModo('harmonica')">Menor harmônica</button>
  <button onclick="setMenorModo('melodica')">Menor melódica</button>
</div>

<div>
  <button onclick="setModo('quintas')">Quintas</button>
  <button onclick="setModo('quartas')">Quartas</button>
  <button onclick="setModo('cromaticoAsc')">Crom ↑</button>
  <button onclick="setModo('cromaticoDesc')">Crom ↓</button>
  <button onclick="setModo('random')">Randômico</button>
</div>

<button id="sortear" onclick="sortear()">Sortear</button><br>
<button id="zerar" onclick="resetar()">Zerar</button>

<div id="resultado">—</div>
<div id="ciclo"></div>

<script>

/* JS mantido estável */

const ciclo = ["C","G","D","A","E","B","F#","Db","Ab","Eb","Bb","F"];

let tipoAcorde="tetrade";
let listaAtual=[];
let embaralhadas=[];
let modo="quintas";
let menorModo="natural";

const letras=["C","D","E","F","G","A","B"];
const semitons={C:0,D:2,E:4,F:5,G:7,A:9,B:11};

function setAcorde(t){ tipoAcorde=t; }

function selecionar(t){
  if(t==="maior"){
    listaAtual=ciclo.slice();
    document.getElementById("submenuMenor").style.display="none";
  } else {
    listaAtual=ciclo.map(n=>n+"m");
    document.getElementById("submenuMenor").style.display="block";
  }
  iniciar();
}

function setModo(m){ modo=m; }
function setMenorModo(m){ menorModo=m; }

function embaralhar(a){
  for(let i=a.length-1;i>0;i--){
    let j=Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

function iniciar(){
  embaralhadas=listaAtual.slice();
  embaralhar(embaralhadas);
}

function resetar(){
  iniciar();
  document.getElementById("resultado").innerText="—";
  document.getElementById("ciclo").innerHTML="";
}

function nota(letra, alvo){
  let base=semitons[letra];
  let diff=(alvo-base+12)%12;
  if(diff===0) return letra;
  if(diff===1) return letra+"#";
  if(diff===11) return letra+"b";
  return letra;
}

function escala(t,ints){
  let base=t.replace("m","");
  let l=base[0];
  let idx=letras.indexOf(l);

  let semi=semitons[l];
  if(base.includes("#")) semi++;
  if(base.includes("b")) semi--;

  let out=[];
  for(let i=0;i<7;i++){
    let letra=letras[(idx+i)%7];
    let alvo=(semi+ints[i])%12;
    out.push(nota(letra,alvo));
  }
  return out;
}

function campo(t){
  const maior=[0,2,4,5,7,9,11];
  const menorNat=[0,2,3,5,7,8,10];
  const menorHar=[0,2,3,5,7,8,11];
  const menorMel=[0,2,3,5,7,9,11];

  if(!t.includes("m")){
    let e=escala(t,maior);
    return [e[0]+"7M",e[1]+"m7",e[2]+"m7",e[3]+"7M",e[4]+"7",e[5]+"m7",e[6]+"ø"];
  }

  if(menorModo==="melodica"){
    let e=escala(t,menorMel);
    return [e[0]+"m7M6",e[1]+"m7",e[2]+"maj7(#5)",e[3]+"7(#11)",e[4]+"7(b13)",e[5]+"ø",e[6]+"ø"];
  }

  if(menorModo==="harmonica"){
    let e=escala(t,menorHar);
    return [e[0]+"m(7M)",e[1]+"ø",e[2]+"7M(#5)",e[3]+"m7",e[4]+"7",e[5]+"7M",e[6]+"°"];
  }

  let e=escala(t,menorNat);
  return [e[0]+"m7",e[1]+"ø",e[2]+"7M",e[3]+"m7",e[4]+"m7",e[5]+"7M",e[6]+"7"];
}

function gerarCiclo(t){
  if(modo==="random") return embaralhar(listaAtual.slice());

  let out=[];
  let i=listaAtual.indexOf(t);

  for(let k=0;k<12;k++){
    let pos=modo==="quartas"?(i-k+12)%12:(i+k)%12;
    out.push(listaAtual[pos]);
  }
  return out;
}

function sortear(){
  if(embaralhadas.length===0) iniciar();

  let t=embaralhadas.pop();
  document.getElementById("resultado").innerText=t;

  let html="";
  gerarCiclo(t).forEach(ton=>{
    let acordes=campo(ton).map(a=>"<div class='acorde'>"+a+"</div>").join("");
    html+="<div class='linha'><div class='tonica'>"+ton+"</div>"+acordes+"</div>";
  });

  document.getElementById("ciclo").innerHTML=html;
}

selecionar("maior");

</script>

</body>
</html>
